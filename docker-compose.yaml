services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      - API_KEY=example-api-key
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
