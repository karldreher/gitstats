services:
  server:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - POLL_INTERVAL_MINUTES=15
      # Persistence
      - PERSISTENCE_FILE=/data/gitstats.json
      # - PERSISTENCE_REDIS_HOST=redis:6379
      # - PERSISTENCE_REDIS_PASS=your-redis-password
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
