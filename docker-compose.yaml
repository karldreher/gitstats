services:
  server:
    build: .
    restart: unless-stopped
    environment:
      # Personal mode (comment out for org mode)
      - GITHUB_PAT=your-pat-here
      - GITHUB_USER=your-github-username
      - POLL_INTERVAL_MINUTES=15
      # Persistence
      - PERSISTENCE_FILE=/data/gitstats.json
      # - PERSISTENCE_REDIS_HOST=redis:6379
      # - PERSISTENCE_REDIS_PASS=your-redis-password
      #
      # Org mode (comment out personal vars above, uncomment below)
      # - GITHUB_APP_ID=12345
      # - GITHUB_APP_INSTALLATION_ID=67890
      # - GITHUB_APP_PRIVATE_KEY=-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----
      # - GITHUB_ORG=your-org-name
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
