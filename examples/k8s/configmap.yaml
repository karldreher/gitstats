apiVersion: v1
kind: ConfigMap
metadata:
  name: gitstats
  namespace: gitstats
data:
  # How often to poll GitHub for new commits (in minutes). Default: 15.
  POLL_INTERVAL_MINUTES: "15"

  # -- File persistence (uncomment to enable) --
  # Path inside the container where state is persisted. Requires a volume
  # mount backed by a PersistentVolumeClaim (see pvc.yaml and deployment.yaml).
  # PERSISTENCE_FILE: "/data/gitstats.json"

  # -- Redis persistence (uncomment to enable) --
  # Mutually exclusive with PERSISTENCE_FILE. The password goes in secret.yaml.
  # PERSISTENCE_REDIS_HOST: "redis:6379"
