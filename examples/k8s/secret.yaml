apiVersion: v1
kind: Secret
metadata:
  name: gitstats
  namespace: gitstats
type: Opaque
# stringData values are plain text — Kubernetes base64-encodes them at apply time.
# Replace every <placeholder> before applying.
stringData:
  GITHUB_APP_ID: "<app-id>"
  GITHUB_APP_INSTALLATION_ID: "<installation-id>"
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    <paste PEM key here>
    -----END RSA PRIVATE KEY-----
  GITHUB_ORG: "<org-name>"

  # Redis persistence password (required only when PERSISTENCE_REDIS_HOST is set)
  # PERSISTENCE_REDIS_PASS: "<redis-password>"
